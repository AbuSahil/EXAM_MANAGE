<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <style>
        /* --- General Page Reset & Centering --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- ID Card Container (Standard CR80 Size Dimensions Ratio) --- */
        .id-card {
            width: 320px;
            height: 490px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            border: 1px solid #e0e0e0;
        }

        /* Header / Banner Styling */
        .card-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            text-align: center;
            padding: 18px 10px 45px 10px; /* Extra bottom padding for avatar overlap */
        }

        .card-header h2 {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-header p {
            font-size: 11px;
            opacity: 0.85;
            margin-top: 2px;
        }

        /* Profile Photo Container */
        .photo-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: -50px auto 10px auto; /* Pull photo up into header */
            overflow: hidden;
            background-color: #e5e7eb;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Student Details Section */
        .card-body {
            text-align: center;
            padding: 0 20px;
        }

        .student-name {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }

        .student-course {
            font-size: 13px;
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .details-table td {
            padding: 5px 0;
            color: #4b5563;
        }

        .details-table td.label {
            font-weight: 600;
            color: #1f2937;
            width: 40%;
        }

        /* Barcode / QR Code Area */
        .card-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #f9fafb;
            border-top: 1px solid #f0f0f0;
            padding: 10px;
            text-align: center;
        }

        .barcode {
            height: 35px;
            width: 80%;
            object-fit: contain;
        }

        /* --- Print Specific Rules --- */
        @media print {
            body {
                background-color: #ffffff;
            }
            .id-card {
                box-shadow: none;
                border: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>

    <div class="id-card">
        <!-- University / School Header -->
        <div class="card-header">
            <h2>ST. ANDREW UNIVERSITY</h2>
            <p>Student Identity Card</p>
        </div>

        <!-- Student Photo (Dynamically Loaded) -->
        <div class="photo-container">
            <img src="{{STUDENT_PHOTO_URL}}" alt="Student Photo">
        </div> 

        <!-- Student Info -->
        <div class="card-body">
            <div class="student-name">{{FIRST_NAME}} {{LAST_NAME}}</div>
            <div class="student-course">{{PROGRAM_NAME}}</div>

            <table class="details-table">
                <tr>
                    <td class="label">ID No:</td>
                    <td>{{STUDENT_ID}}</td>
                </tr>
                <tr>
                    <td class="label">DOB:</td>
                    <td>{{DATE_OF_BIRTH}}</td>
                </tr>
                <tr>
                    <td class="label">Blood Group:</td>
                    <td>{{BLOOD_GROUP}}</td>
                </tr>
                <tr>
                    <td class="label">Valid Until:</td>
                    <td>{{EXPIRY_DATE}}</td>
                </tr>
            </table>
        </div>

        <!-- Card Footer / Barcode -->
        <div class="card-footer">
            <img class="barcode" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{STUDENT_ID}}" alt="QR Code">
        </div>
    </div>

</body>
</html>
