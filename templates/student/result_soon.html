<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Coming Soon</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 16px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Responsive Container */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem 1.5rem;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        /* Typography with Fluid Sizing */
        h1 {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            line-height: 1.2;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p.subtitle {
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            color: #f0f0f0;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .loader-icon {
            font-size: clamp(3rem, 10vw, 4rem);
            margin-bottom: 15px;
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        /* Grid-based Responsive Countdown */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 6px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-box span {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 700;
            display: block;
            line-height: 1.1;
        }

        .time-box label {
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            text-transform: uppercase;
            color: #ddd;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Mobile-first Form Design */
        .notify-box {
            margin-top: 1.5rem;
        }

        .notify-box p {
            font-size: 0.95rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        input[type="email"] {
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            width: 100%;
            outline: none;
            font-size: 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background: #fff;
            color: #e73c7e;
            border: none;
            padding: 14px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: transform 0.2s ease, background 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #eee;
            opacity: 0.8;
        }

        /* Tablet and Desktop Enhancements */
        @media (min-width: 480px) {
            .container {
                padding: 3rem 2.5rem;
            }
            .countdown-container {
                gap: 16px;
            }
            .time-box {
                padding: 16px 10px;
            }
            .input-group {
                flex-direction: row;
                gap: 0;
                background: #fff;
                border-radius: 30px;
                padding: 4px;
                overflow: hidden;
            }
            input[type="email"] {
                text-align: left;
                border-radius: 30px 0 0 30px;
                padding: 12px 20px;
                box-shadow: none;
            }
            button {
                width: auto;
                white-space: nowrap;
                border-radius: 30px;
                padding: 12px 28px;
                box-shadow: none;
            }
            button:hover {
                background: #23a6d5;
                color: #fff;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader-icon">📢</div>

        <h1>Results Announcement</h1>
        <p class="subtitle">The wait is almost over. We are compiling the final scores!</p>

        <!-- Dynamic Grid Countdown -->
        <div class="countdown-container">
            <div class="time-box">
                <span id="days">00</span>
                <label>Days</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>Hours</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>Mins</label>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <label>Secs</label>
            </div>
        </div>

        <!-- Touch-Optimized Form -->
        <!-- <div class="notify-box">
            <p>Get an instant alert as soon as results are out:</p>
            <form action="#" method="POST" class="input-group">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Notify Me</button>
            </form>
        </div> -->

        <p class="footer-text">© 2026 BJV. All rights reserved.</p>
    </div>

    <script>
        // Adjust the countdown target here
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 10); 

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
